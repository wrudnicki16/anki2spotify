appId: host.exp.exponent
---
# Journey 3b: Manual timestamp capture on CaptureScreen
# Precondition: On CaptureScreen with a selected track
- launchApp
- extendedWaitUntil:
    visible: "Expo Go"
    timeout: 15000
- openLink: "${EXPO_URL}"

# Connect to Spotify (fails if not already authenticated)
- tapOn:
    id: "connect-spotify"
- extendedWaitUntil:
    visible: "Agree"
    timeout: 10000
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Agree"
    optional: true

# Navigate to a deck → card → track → CaptureScreen
- tapOn:
    id: "deck-item"
    index: 0
- tapOn:
    id: "filter-pending"
- tapOn:
    id: "card-item"
    index: -1
- extendedWaitUntil:
    visible: "Select"
    timeout: 10000
- tapOn:
    id: "select-track"
    index: 0

# Assert on CaptureScreen
- assertVisible: "Open in Spotify"

# Tap "Enter time manually"
- tapOn:
    id: "enter-time-manually"

# Assert TimestampPicker appears
- assertVisible: "Enter Timestamp"

# Enter minutes
- tapOn:
    id: "input-minutes"
- inputText: "1"
- hideKeyboard

# Enter seconds
- tapOn:
    id: "input-seconds"
- inputText: "30"
- hideKeyboard

# Enter a note
- tapOn:
    id: "input-note"
- inputText: "chorus"
- hideKeyboard

# Tap Save
- tapOn:
    id: "picker-save"

# Assert saved clip appears
- assertVisible: "Saved Clips"
- assertVisible: "1:30"
- assertVisible: "chorus"
