appId: host.exp.exponent
---
# Journey 2a: Navigate to CardQueueScreen
# Precondition: At least one deck with cards exists
- launchApp
- openLink: "exp://10.0.2.2:8081"

- assertVisible: "Your Decks"

# Tap the first deck to navigate to CardQueueScreen
- tapOn:
    text: ".*cards"
    index: 0

# Assert CardQueueScreen elements
- assertVisible: "Playlist"
- assertVisible: "Match Cards"
- assertVisible: "Export"

# Assert filter pills are visible
- assertVisible: "All"
- assertVisible: "Pending"
- assertVisible: "Matched"
- assertVisible: "Skipped"
